server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # REVERSE PROXY → ms-reservas (evita CORS)
    # -------------------------------------------------------
    location /proxy/reservas/ {
        proxy_pass http://ms-api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-paciente (evita CORS)
    # -------------------------------------------------------
    location /proxy/pacientes/ {
        proxy_pass http://ms-api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-urgencias-flujo (evita CORS)
    # -------------------------------------------------------
    location /proxy/urgencias/ {
        proxy_pass http://ms-api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-api-gateway (Ficha Clínica / api/v1)
    # -------------------------------------------------------
    location /api/v1/ {
        proxy_pass http://ms-api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-api-gateway (Agendas / agendas)
    # -------------------------------------------------------
    location /agendas/ {
        proxy_pass http://ms-api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # Soporte para React Router (SPA)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos generados por Vite (hash en nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el HTML principal
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

